<!DOCTYPE html>
<html>
<head>
<title>AIP-210 Trainer</title>

<style>

/* ===== GLOBAL ===== */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
}

/* ===== HEADER ===== */
#headerBar {
    position: fixed;
    top: 0;
    width: 100%;
    height: 50px;

    background: linear-gradient(90deg, #1e293b, #0f172a);
    color: white;

    display: flex;
    align-items: center;
    justify-content: center;

    font-size: 20px;
    font-weight: bold;
    letter-spacing: 1px;

    z-index: 1000;
}

/* ===== WATERMARK LOGO ===== */
.watermark {
    position: fixed;
    top: 65%;
    left: 50%;
    transform: translate(-50%, -50%);
    
    width: 500px;

    opacity: 0.12; /* 👈 more visible but still subtle */

    filter: blur(0.5px) drop-shadow(0 0 20px rgba(56,189,248,0.2));

    z-index: 0;
    pointer-events: none;
}

/* ===== LAYOUT ===== */
.container {
    display: flex;
    margin-top: 60px;
    height: calc(100vh - 60px);
}

/* ===== NAV PANEL ===== */
#nav {
    width: 140px;
    background: #111827;
    overflow-y: auto;
    padding: 10px;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 5px;
}

#nav button {
    background: #374151;
    color: white;
    border: none;
    padding: 6px;
    border-radius: 4px;
    cursor: pointer;
}

#nav button:hover {
    background: #2563eb;

}

/* ===== MAIN CONTENT ===== */
.main {
    flex: 1;
    padding: 20px;

    max-width: 900px;
    margin: 0 auto;

    text-align: left;
    z-index: 1;
}

/* ===== ACTION BAR ===== */
.action-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 15px;
}

#timer {
    margin-left: auto;
    font-weight: bold;
}

#progress {
    font-weight: bold;
}

/* ===== QUESTION ===== */
#question {
    font-size: 24px;       /* 👈 bigger */
    font-weight: 500;      /* 👈 slightly bolder */
    margin-bottom: 18px;
    line-height: 1.6;      /* 👈 easier reading */
}

/* ===== OPTIONS ===== */
#options {
    margin-top: 15px;
}

/* ===== ANSWER OPTIONS ===== */
#options label {
    display: block;
    padding: 10px 12px;
    margin-bottom: 10px;

    font-size: 18px;          /* 👈 bigger text */
    line-height: 1.5;

    background: #1e293b;
    border-radius: 8px;
    cursor: pointer;

    transition: all 0.2s ease;
}

/* Hover effect */
#options label:hover {
    background: #334155;
}

/* Selected option */
#options input[type="radio"]:checked + span {
    color: #22c55e;
    font-weight: bold;
}

/* ===== SUBMIT BUTTON ===== */
#submitBtn {
    margin-top: 20px;
    background: #22c55e;
}

#submitBtn:disabled {
    background: #475569;
    cursor: not-allowed;
}
#exitBtn {
    background: #ef4444;
}

#exitBtn:hover {
    background: #dc2626;
}
/* ===== GENERAL BUTTONS ===== */
button {
    padding: 8px 12px;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}
/* ✅ SUBMIT ANSWER BUTTON (CUSTOM STYLE) */
#submitBtn {
    background: white;
    color: rgb(4, 110, 13);
    border: 2px solid #22c55e;  /* green border */
}

#submitBtn:hover {
    background: #8ff6ae;        /* light green tint */
    border-color: #16a34a;
}
button:hover {
    background: #1d4ed8;
}

/* 🟢 BEGIN EXAM BUTTON */
#startBtn {
    background: #22c55e;
}

#startBtn:hover {
    background: #16a34a;
}

/* 🟠 PAUSE BUTTON */
#pauseBtn {
    background: #f59e0b;
    color: black;
}

#pauseBtn:hover {
    background: #d97706;
}

/* ===== TIMER + PROGRESS ===== */
#timer {
    color: #22c55e;
    font-weight: bold;
    margin-left: 10px;
}

#progress {
    color: #60a5fa;
    font-weight: bold;
    margin-left: 10px;
}

/* ===== PROGRESS BAR ===== */
.progress-bar {
    height: 6px;
    background: #1e293b;
}

.progress-fill {
    height: 100%;
    background: #3b82f6;
    width: 0%;
}

/* ===== REVIEW COLORS ===== */
.correct {
    color: #22c55e;
}

.incorrect {
    color: #ef4444;
}

/* ===== SCROLLBAR (OPTIONAL POLISH) ===== */
#nav::-webkit-scrollbar {
    width: 6px;
}

#nav::-webkit-scrollbar-thumb {
    background: #374151;
    border-radius: 3px;
}

</style>
</head>

<body>

<div id="headerBar">
    <img src="/static/mdi_bg.png" style="height:30px; margin-right:10px;">
    <span>AIP-210 Exam Trainer</span>
</div>

<img src="/static/mdi_bg.png" class="watermark">

<div class="progress-bar">
    <div id="progressFill" class="progress-fill"></div>
</div>
<div class="container">

    <div id="nav"></div>

    <div class="main">

        <div class="action-bar">
            <button id="startBtn" onclick="startExam()">Begin Exam</button>
            <button onclick="resumeExam()">Resume Exam</button>
            <button onclick="flagQuestion()">Flag</button>
            <button onclick="showReview()">Review</button>
            <button onclick="downloadPDF()">Print Results to PDF</button>
            <button id="pauseBtn" onclick="pauseExam()">Pause Once (5 min break)</button>

            <span id="timer">⏱ 120:00</span>
            <span id="progress">0%</span>
            <button id="exitBtn" onclick="exitExam()">Exit Exam</button>
            <button onclick="window.open('/flashcards', '_blank')">Flashcards</button>
        </div>

        <div id="question"></div>

        <div id="options"></div>
<button id="submitBtn" onclick="submitAnswer()"style="margin-top:20px;">Submit Answer</button>

        <!--<div style="color:red;">TEST STYLE</div>-->

</div>

<script>
console.log("REAL TEMPLATE LOADED");
let totalTime = 7200;
let timerInterval = null;
let flagged = new Set();

/* TIMER */
function startTimer(){

    if(timerInterval){
        clearInterval(timerInterval);
    }

    timerInterval = setInterval(()=>{

        if(totalTime <= 0){
            clearInterval(timerInterval);
            timerInterval = null;

            alert("Time is up! Submitting exam...");
            showReview();
            return;
        }

        let mins = Math.floor(totalTime / 60);
        let secs = totalTime % 60;

        document.getElementById("timer").innerText =
            `⏱ ${mins}:${secs.toString().padStart(2,'0')}`;

        totalTime--;

    }, 1000);
}

/* START */
function startExam(){

    if(timerInterval){
        clearInterval(timerInterval);
        timerInterval = null;
    }

    fetch("/start")
    .then(res => res.json())
    .then(data => {
        loadQuestion();
        startTimer();
    })
    .catch(err => console.error("START ERROR:", err));
}

function resumeExam(){

    console.log("RESUME CLICKED");  // debug

    fetch("/resume")
    .then(r => r.json())
    .then(data => {

        console.log("RESUME RESPONSE:", data);  // debug

        if(!data.success){
            alert("No saved session found");
            return;
        }

        if(timerInterval){
            clearInterval(timerInterval);
            timerInterval = null;
        }

        loadQuestion();
        startTimer();
    })
    .catch(err => console.error("Resume error:", err));
}

/* LOAD QUESTION */
function loadQuestion(){

    fetch("/question")
    .then(r => r.json())
    .then(data => {

        if(data.done){
            showReview();
            return;
        }

        totalTime = data.remaining;

        let q = data.q;

        document.getElementById("question").innerText = q.prompt;

        let html = "";

        q.options.forEach(opt=>{
            html += `
                <label>
                    <input type="radio" name="a" value="${opt}">
                    ${opt}
                </label>
            `;
        });

        document.getElementById("options").innerHTML = html;
            
        let btn = document.getElementById("submitBtn");
        if(btn){
            btn.disabled = false;
}
        // Restore previous answer
        if(data.answers && data.answers[data.idx]){
            let selected = data.answers[data.idx];
            let radios = document.querySelectorAll('input[name="a"]');

            radios.forEach(r=>{
                if(r.value === selected){
                    r.checked = true;
                }
            });
        }

        document.getElementById("progress").innerText =
            `Q ${data.idx + 1} / ${data.total}`;
            // 🔹 Build navigation panel
let nav = "";

for(let i = 0; i < data.total; i++){

    let style = "background:#374151;";

    // Current question
    if(i === data.idx){
        style = "background:#2563eb;";
    }

    // Answered (not flagged)
    else if(data.answers && data.answers[i] && !(data.flagged || []).includes(i)){
        style = "background:#16a34a;";
    }

    // Flagged
    if(data.flagged && data.flagged.includes(i)){
        style = "background:#eab308; color:black;";
    }

    nav += `
        <button onclick="goTo(${i})" style="${style}">
            ${i + 1}
        </button>
    `;
}

document.getElementById("nav").innerHTML = nav;
    });
}

/* SUBMIT */
function submitAnswer(){

    let sel = document.querySelector('input[name="a"]:checked');

    if(!sel){ 
        alert("Please select an answer");
        return; 
    }

    fetch("/answer",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({answer:sel.value})
    })
    .then(res => res.json())
    .then(data => {
        loadQuestion();  // 🔥 force refresh after submit
    })
    .catch(err => console.error("Submit error:", err));
}

/* NAV */
function goTo(i){
    fetch("/goto/"+i).then(()=>loadQuestion());
}

/* FLAG */
function flagQuestion(){
    fetch("/flag", { method: "POST" })
    .then(()=>loadQuestion());
}

/* REVIEW */
function showReview(){

    fetch("/score")
    .then(r=>r.json())
    .then(data=>{

        let percent = Math.round((data.score / data.total) * 100);

        let html = `
        <h2>Score: ${data.score}/${data.total} (${percent}%)</h2>
        <hr>
        `;

        data.results.forEach((r,i)=>{
            html += `<div><b>Q${i+1}:</b> ${r.question}</div>`;
        });

        document.getElementById("question").innerHTML = html;
        document.getElementById("options").innerHTML = "";
    });
}
function exitExam(){

    if(!confirm("Exit exam and download results?")){
        return;
    }

    // Stop timer
    if(timerInterval){
        clearInterval(timerInterval);
        timerInterval = null;
    }

    // Download PDF
    window.open("/download_pdf", "_blank");

    // Redirect instead of closing (more reliable)
    setTimeout(()=>{
        window.location.href = "/";
    }, 500);
}
setInterval(() => {

    console.log("AUTOSAVE TRIGGERED");

    fetch("/save", {
        method: "POST"
    })
    .then(() => {
        console.log("Auto-saved");
    })
    .catch(err => console.error("Autosave failed:", err));

}, 15000); // every 15 seconds
</script>

</body>
</html>

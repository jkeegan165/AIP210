<!DOCTYPE html>
<html>
<head>
    <title>Flashcards</title>

    <style>
        body {
            margin: 0;
            background: #0f172a;
            color: white;
            font-family: Arial;

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;

            height: 100vh;
        }

        h1 {
            margin-bottom: 10px;
        }

        .card {
            background: #1e293b;
            border-radius: 12px;

            width: 80%;
            max-width: 900px;
            height: 60vh;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            padding: 30px;
            text-align: center;

            cursor: pointer;
        }

        .question {
            font-size: 28px;
        }

        .answer {
            margin-top: 20px;
            font-size: 22px;
            color: #22c55e;
            display: none;
        }

        .hint {
            margin-top: 15px;
            font-size: 16px;
            color: #facc15;
            display: none;
        }

        .controls {
            margin-top: 20px;
        }

        button {
            margin: 5px;
            padding: 10px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }

        .next { background: white; color: black; }
        .hintBtn { background: orange; color: black; }
        .shuffle { background: #22c55e; color: black; }

    </style>
</head>

<body>

<h1>Flashcards</h1>

<div id="cardContainer"></div>

<div class="controls">
    <button class="hintBtn" onclick="toggleHint()">Hint</button>
    <button class="next" onclick="nextCard()">Next</button>
    <button class="shuffle" onclick="shuffleCards()">Shuffle</button>
</div>

<script>
let cards = {{ cards|tojson }};
let current = 0;

function renderCard(){
    let c = cards[current];

    document.getElementById("cardContainer").innerHTML = `
        <div class="card" onclick="flipCard()">
            <div class="question">${c.front.text}</div>
            <div class="answer" id="answer">${c.back.text}</div>
            <div class="hint" id="hint">${c.hint ? c.hint.text : ""}</div>
        </div>
    `;
}

function flipCard(){
    let a = document.getElementById("answer");
    a.style.display = (a.style.display === "none") ? "block" : "none";
}

function toggleHint(){
    let h = document.getElementById("hint");
    h.style.display = (h.style.display === "none") ? "block" : "none";
}

function nextCard(){
    current = (current + 1) % cards.length;
    renderCard();
}

function shuffleCards(){
    for (let i = cards.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [cards[i], cards[j]] = [cards[j], cards[i]];
    }
    current = 0;
    renderCard();
}

renderCard();
</script>

</body>
</html>

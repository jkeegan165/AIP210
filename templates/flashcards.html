<!DOCTYPE html>
<html>
<head>
    <title>Flashcards</title>

    <style>

    body {
    margin: 0;
    background: #0f172a;
    color: white;
    font-family: Arial;

    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;

    height: 100vh;
}

h1 {
    margin-bottom: 10px;
}

.card {
    background: #1e293b;
    border-radius: 12px;

    width: 700px;
    max-width: 90%;
    height: 60vh;

    display: flex;
    justify-content: center;
    align-items: center;

    padding: 30px;
    text-align: center;

    cursor: pointer;
    perspective: 1000px;
}

.card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.6s;
}

.card-inner.flipped {
    transform: rotateY(180deg);
}

.card-front,
.card-back {
    position: absolute;
    width: 100%;
    height: 100%;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
}

.card-front {
    background: #1e293b;
    color: white;
}

.card-back {
    background: #020617;
    color: #22c55e;
    transform: rotateY(180deg);
}

.question {
    font-size: 26px;
    max-width: 90%;
    line-height: 1.5;
}

.answer {
    font-size: 24px;
    color: #22c55e;
}

.hint {
    margin-top: 10px;
    font-size: 16px;
    color: #facc15;
}

#cardContainer {
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
}

.controls {
    margin-top: 20px;
}

button {
    margin: 6px;
    padding: 10px 16px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: 0.2s;

    box-shadow: 0 2px 6px rgba(0,0,0,0.3); 
}

/* Primary actions */
.next {
    background: #3b82f6;
    color: white;
}

.shuffle {
    background: #22c55e;
    color: black;
}

/* Secondary */
.hintBtn {
    background: #f59e0b;
    color: black;
}

/* Learning actions */
button[onclick="markKnow()"] {
    background: #16a34a;
    color: white;
}

button[onclick="markDontKnow()"] {
    background: #ef4444;
    color: white;
}

/* Hover effect */
button:hover {
    transform: scale(1.05);
    opacity: 0.9;
}

</style>

</head>

<body>

<h1>Flashcards</h1>

<div id="cardContainer"></div>

<div class="controls">
    <button class="hintBtn" onclick="toggleHint()">Hint</button>
    <button class="next" onclick="nextCard()">Next</button>
    <button class="shuffle" onclick="shuffleCards()">Shuffle</button>

    <!-- 🔥 ADD THESE -->
    <button onclick="markKnow()">✅ Know</button>
    <button onclick="markDontKnow()">🔁 Don’t Know</button>
</div>

<script>
let cards = {{ cards|tojson }};
let current = 0;
let showingFront = true;

function renderCard(){

    showingFront = true;  // 🔥 reset flip each card

    let c = cards[current];

    document.getElementById("cardContainer").innerHTML = `
        <div class="card" onclick="flipCard()">
    <div class="card-inner" id="cardInner">

        <div class="card-front">
            <div class="question">${c.front.text}</div>
        </div>

        <div class="card-back">
            <div class="answer">
                ${c.back.text}
            </div>
            <div class="hint" id="hint" style="display:none;">
                ${c.hint ? c.hint.text : ""}
            </div>
        </div>

    </div>
</div>
    `;
}

function flipCard(){
    let card = document.getElementById("cardInner");
    card.classList.toggle("flipped");
}

function toggleHint(){
    let h = document.getElementById("hint");

    if(!h) return;

    h.style.display = (h.style.display === "none") ? "block" : "none";
}

function nextCard(){
    current = (current + 1) % cards.length;
    renderCard();
}

function shuffleCards(){
    for (let i = cards.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [cards[i], cards[j]] = [cards[j], cards[i]];
    }
    current = 0;
    renderCard();
}

function markKnow(){

    // remove card
    cards.splice(current, 1);

    if(cards.length === 0){
        alert("All cards mastered 🎉");
        return;
    }

    if(current >= cards.length){
        current = 0;
    }

    renderCard();
}

function markDontKnow(){

    let card = cards.splice(current, 1)[0];
    cards.push(card);

    if(current >= cards.length){
        current = 0;
    }

    renderCard();
}

renderCard();
</script>

</body>
</html>
